<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<title>miniwave viz</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0d0d0d;width:100%;height:100%;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges}
#rotate-msg{display:none;position:fixed;inset:0;background:#0d0d0d;color:#aaa;font-family:'SF Mono','Fira Code',monospace;font-size:16px;z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:12px}
#rotate-msg .icon{font-size:48px;animation:spin 2s ease-in-out infinite}
@keyframes spin{0%,100%{transform:rotate(0deg)}50%{transform:rotate(90deg)}}
@media(orientation:portrait){#rotate-msg{display:flex}canvas{display:none}}
</style>
</head>
<body>
<div id="rotate-msg"><div class="icon">&#x21BB;</div><div>rotate device to landscape</div></div>
<canvas id="c"></canvas>
<script>
'use strict';

const CH_COLORS = [
  '#e94560','#00d4aa','#8866cc','#ff8800',
  '#00aaff','#ffd700','#ff66aa','#66ffcc',
  '#aa44ff','#ff4400','#44ddff','#aaff00',
  '#ff88cc','#44ff88','#ffaa44','#88aaff'
];

/* ── Lo-res canvas — nearest neighbor upscale ── */
const LO_W = 320;
const LO_H = 180;
const canvas = document.getElementById('c');
const loCanvas = document.createElement('canvas');
loCanvas.width = LO_W;
loCanvas.height = LO_H;
const ctx = loCanvas.getContext('2d');
const hiCtx = canvas?.getContext('2d');
if (hiCtx) hiCtx.imageSmoothingEnabled = false;

/* ── State ── */
let scopeCur = new Float32Array(512);
let scopePrev = new Float32Array(512);
let scopeInterp = new Float32Array(512);
let scopeAge = 0;

const peaks = new Float32Array(16);
const holds = new Float32Array(16);
const masterPk = [0,0];
const masterHold = [0,0];
let focusedCh = 0;
let bpm = 120;
const slotActive = new Array(16).fill(false);
const slotTypes = new Array(16).fill('');

const particles = [];
const MAX_PARTICLES = 150;

const FFT_N = 1024; /* zero-pad to this size for fine freq resolution */
const FFT_BINS = FFT_N / 2;
const fftMag = new Float32Array(FFT_BINS);
const fftSmooth = new Float32Array(48); /* display bins */

let beatPhase = 0;

/* ── Adaptive peak normalization ── */
let peakTrack = 0.01;
let fftPeakTrack = 0.005;
const PK_ATK = 0.15;
const PK_DEC = 0.001;

/* ── Slipstream streaks ── */
const MAX_STREAKS = 60;
const streaks = [];
function spawnStreak() {
  return {
    angle: Math.random() * 6.283,
    dist: Math.random() * 0.15,
    speed: 0.2 + Math.random() * 0.6,
    len: 0.015 + Math.random() * 0.04,
    cr: 42 + Math.floor(Math.random() * 30),
    cg: 42 + Math.floor(Math.random() * 30),
    cb: 74 + Math.floor(Math.random() * 40)
  };
}
for (let i = 0; i < MAX_STREAKS; i++) {
  const s = spawnStreak();
  s.dist = Math.random(); /* spread initial */
  streaks.push(s);
}

/* ── API / SSE ── */
const api = b => fetch('/api',{method:'POST',body:JSON.stringify(b)}).then(r=>r.json());

function pollScope() {
  api({type:'scope'}).then(d => {
    if (d.samples?.length) {
      scopePrev = new Float32Array(scopeInterp);
      scopeCur = new Float32Array(d.samples);
      scopeInterp = new Float32Array(scopeCur.length);
      scopeAge = 0;
      computeFFT();
    }
  }).catch(()=>{});
}

/* Radix-2 in-place FFT */
function fftRadix2(re, im, N) {
  /* Bit-reversal permutation */
  for (let i = 1, j = 0; i < N; i++) {
    let bit = N >> 1;
    while (j & bit) { j ^= bit; bit >>= 1; }
    j ^= bit;
    if (i < j) {
      let t = re[i]; re[i] = re[j]; re[j] = t;
      t = im[i]; im[i] = im[j]; im[j] = t;
    }
  }
  /* Cooley-Tukey butterflies */
  for (let len = 2; len <= N; len *= 2) {
    const half = len / 2;
    const ang = -6.283185307 / len;
    const wRe = Math.cos(ang), wIm = Math.sin(ang);
    for (let i = 0; i < N; i += len) {
      let curRe = 1, curIm = 0;
      for (let j = 0; j < half; j++) {
        const a = i + j, b = a + half;
        const tRe = curRe * re[b] - curIm * im[b];
        const tIm = curRe * im[b] + curIm * re[b];
        re[b] = re[a] - tRe; im[b] = im[a] - tIm;
        re[a] += tRe; im[a] += tIm;
        const nRe = curRe * wRe - curIm * wIm;
        curIm = curRe * wIm + curIm * wRe;
        curRe = nRe;
      }
    }
  }
}

function computeFFT() {
  const frames = Math.floor(scopeCur.length / 2);
  const re = new Float32Array(FFT_N);
  const im = new Float32Array(FFT_N);
  const usable = Math.min(frames, FFT_N);
  /* Hann window + mono mix, zero-padded */
  for (let i = 0; i < usable; i++) {
    const w = 0.5 * (1 - Math.cos(6.283185307 * i / (usable - 1)));
    re[i] = (scopeCur[i*2] + scopeCur[i*2+1]) * 0.5 * w;
  }
  fftRadix2(re, im, FFT_N);
  for (let k = 0; k < FFT_BINS; k++) {
    fftMag[k] = Math.sqrt(re[k]*re[k] + im[k]*im[k]) / FFT_N;
  }
}

setInterval(pollScope, 50);

const es = new EventSource('/events');

es.addEventListener('rack_status', e => {
  const d = JSON.parse(e.data);
  focusedCh = d.focused_ch || 0;
  bpm = d.bpm || 120;
  if (d.slots) {
    d.slots.forEach((s,i) => {
      slotActive[i] = !!s.active;
      slotTypes[i] = s.type || '';
      peaks[i] = s.pk ? Math.max(s.pk[0], s.pk[1]) : 0;
      holds[i] = s.hold ? Math.max(s.hold[0], s.hold[1]) : 0;
    });
  }
  if (d.master_pk) { masterPk[0] = d.master_pk[0]; masterPk[1] = d.master_pk[1]; }
  if (d.master_hold) { masterHold[0] = d.master_hold[0]; masterHold[1] = d.master_hold[1]; }
});

es.addEventListener('midi_events', e => {
  const d = JSON.parse(e.data);
  if (!d.events) return;
  for (const ev of d.events) {
    const [status, d1, d2] = ev;
    if ((status & 0xF0) === 0x90 && d2 > 0) {
      spawnParticles(status & 0x0F, d1, d2);
    }
  }
});

/* ── Particles — low-poly vector shapes ── */
function spawnParticles(ch, note, vel) {
  const count = Math.max(2, Math.floor(vel / 25));
  const x = note / 127;
  const speed = vel / 127;
  const color = CH_COLORS[ch % 16];
  for (let i = 0; i < count && particles.length < MAX_PARTICLES; i++) {
    particles.push({
      x: x + (Math.random() - 0.5) * 0.06,
      y: 0.7 + (Math.random() - 0.5) * 0.15,
      vx: (Math.random() - 0.5) * 0.004 * speed,
      vy: -(0.003 + Math.random() * 0.005) * speed,
      life: 1.0,
      decay: 0.005 + Math.random() * 0.008,
      size: 2 + Math.floor(vel / 35),
      shape: Math.floor(Math.random() * 4),
      rot: Math.random() * 6.283,
      spin: (Math.random() - 0.5) * 0.06,
      color
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.00003;
    p.rot += p.spin;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawPoly(cx, cy, sz, shape, rot) {
  const s = Math.max(1, Math.floor(sz));
  const px = Math.floor(cx);
  const py = Math.floor(cy);
  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(rot);
  ctx.beginPath();
  if (shape === 0) { /* diamond */
    ctx.moveTo(0,-s); ctx.lineTo(s,0); ctx.lineTo(0,s); ctx.lineTo(-s,0);
  } else if (shape === 1) { /* tri up */
    ctx.moveTo(0,-s); ctx.lineTo(s,s); ctx.lineTo(-s,s);
  } else if (shape === 2) { /* tri down */
    ctx.moveTo(-s,-s); ctx.lineTo(s,-s); ctx.lineTo(0,s);
  } else { /* square */
    ctx.rect(-s,-s,s*2,s*2);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

/* ── Resize ── */
function doResize() {
  if (!canvas) return;
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  if (hiCtx) hiCtx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', doResize);
doResize();

function hexRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}

/* ── 5x7 bitmap font ── */
const FONT = {
  a:[0x7C,0x12,0x11,0x12,0x7C], b:[0x7F,0x49,0x49,0x49,0x36],
  c:[0x3E,0x41,0x41,0x41,0x22], d:[0x7F,0x41,0x41,0x22,0x1C],
  e:[0x7F,0x49,0x49,0x49,0x41], f:[0x7F,0x09,0x09,0x09,0x01],
  g:[0x3E,0x41,0x49,0x49,0x3A], h:[0x7F,0x08,0x08,0x08,0x7F],
  i:[0x00,0x41,0x7F,0x41,0x00], j:[0x20,0x40,0x41,0x3F,0x01],
  k:[0x7F,0x08,0x14,0x22,0x41], l:[0x7F,0x40,0x40,0x40,0x40],
  m:[0x7F,0x02,0x0C,0x02,0x7F], n:[0x7F,0x04,0x08,0x10,0x7F],
  o:[0x3E,0x41,0x41,0x41,0x3E], p:[0x7F,0x09,0x09,0x09,0x06],
  q:[0x3E,0x41,0x51,0x21,0x5E], r:[0x7F,0x09,0x19,0x29,0x46],
  s:[0x46,0x49,0x49,0x49,0x31], t:[0x01,0x01,0x7F,0x01,0x01],
  u:[0x3F,0x40,0x40,0x40,0x3F], v:[0x1F,0x20,0x40,0x20,0x1F],
  w:[0x3F,0x40,0x30,0x40,0x3F], x:[0x63,0x14,0x08,0x14,0x63],
  y:[0x07,0x08,0x70,0x08,0x07], z:[0x61,0x51,0x49,0x45,0x43],
  '0':[0x3E,0x51,0x49,0x45,0x3E], '1':[0x00,0x42,0x7F,0x40,0x00],
  '2':[0x42,0x61,0x51,0x49,0x46], '3':[0x22,0x41,0x49,0x49,0x36],
  '4':[0x18,0x14,0x12,0x7F,0x10], '5':[0x27,0x45,0x45,0x45,0x39],
  '6':[0x3C,0x4A,0x49,0x49,0x30], '7':[0x01,0x71,0x09,0x05,0x03],
  '8':[0x36,0x49,0x49,0x49,0x36], '9':[0x06,0x49,0x49,0x29,0x1E],
  ':':[0x00,0x00,0x36,0x36,0x00], '-':[0x08,0x08,0x08,0x08,0x08],
  ' ':[0x00,0x00,0x00,0x00,0x00]
};

function drawText(x, y, text, color) {
  ctx.fillStyle = color;
  let cx = x;
  for (const ch of text.toLowerCase()) {
    const glyph = FONT[ch];
    if (!glyph) { cx += 4; continue; }
    for (let col = 0; col < glyph.length; col++) {
      for (let row = 0; row < 7; row++) {
        if (glyph[col] & (1 << row)) {
          ctx.fillRect(cx + col, y + row, 1, 1);
        }
      }
    }
    cx += glyph.length + 1;
  }
  return cx;
}

/* ── Render ── */
function render() {
  requestAnimationFrame(render);
  if (!ctx || !hiCtx) return;

  const W = LO_W;
  const H = LO_H;
  const dt = 1/60;

  /* Interpolate scope */
  scopeAge += dt;
  const blend = Math.min(scopeAge / 0.08, 1);
  let maxSample = 0;
  const sLen = scopeCur.length;
  for (let i = 0; i < sLen; i++) {
    const prev = i < scopePrev.length ? scopePrev[i] : 0;
    const cur = scopeCur[i];
    scopeInterp[i] = prev + (cur - prev) * blend;
    const v = Math.abs(scopeInterp[i]);
    if (v > maxSample) maxSample = v;
  }

  /* Adaptive peak normalization */
  if (maxSample > peakTrack) peakTrack = maxSample; /* instant attack */
  else { peakTrack -= PK_DEC; if (peakTrack < 0.005) peakTrack = 0.005; }

  let maxFFT = 0;
  for (let i = 0; i < FFT_BINS; i++) { if (fftMag[i] > maxFFT) maxFFT = fftMag[i]; }
  if (maxFFT > fftPeakTrack) fftPeakTrack = maxFFT; /* instant attack */
  else { fftPeakTrack -= PK_DEC * 0.3; if (fftPeakTrack < 0.001) fftPeakTrack = 0.001; }
  const fftCeil = fftPeakTrack * 1.6; /* headroom so bars don't clip */

  const waveGain = 0.85 / peakTrack;
  const audioLevel = Math.max(masterPk[0], masterPk[1]);

  /* BPM pulse */
  beatPhase += (bpm / 60) * dt;
  if (beatPhase > 1) beatPhase -= 1;
  const beatPulse = Math.exp(-beatPhase * 8);

  /* Clear with trail */
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = `rgba(13,13,13,${0.15 + beatPulse * 0.04})`;
  ctx.fillRect(0, 0, W, H);

  /* ── Slipstream streaks (replaces grid) ── */
  const vcx = W * 0.4;
  const vcy = H * 0.45;
  const speedMul = 0.8 + audioLevel * 2.5;
  for (const s of streaks) {
    s.dist += s.speed * speedMul * dt * 0.016;
    if (s.dist > 1.2) {
      Object.assign(s, spawnStreak());
    }
    const d0 = s.dist;
    const d1 = d0 + s.len * (1 + audioLevel * 2);
    const cx0 = Math.floor(vcx + Math.cos(s.angle) * d0 * W * 0.7);
    const cy0 = Math.floor(vcy + Math.sin(s.angle) * d0 * H * 0.7);
    const cx1 = Math.floor(vcx + Math.cos(s.angle) * d1 * W * 0.7);
    const cy1 = Math.floor(vcy + Math.sin(s.angle) * d1 * H * 0.7);
    const alpha = Math.min(1, d0 * 2) * (0.15 + audioLevel * 0.3);
    ctx.strokeStyle = `rgba(${s.cr},${s.cg},${s.cb},${alpha})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx0, cy0);
    ctx.lineTo(cx1, cy1);
    ctx.stroke();
  }

  /* ── FFT spectrum (full height, behind scope) — log freq, normalized ── */
  const fftH = H;
  const fftBins = 48;
  const barW = Math.ceil(W / fftBins);
  const logMin = Math.log(1);
  const logMax = Math.log(FFT_BINS);
  for (let i = 0; i < fftBins; i++) {
    const rawStart = Math.floor(Math.exp(logMin + (i / fftBins) * (logMax - logMin)));
    const rawEnd = Math.min(FFT_BINS - 1, Math.floor(Math.exp(logMin + ((i + 1) / fftBins) * (logMax - logMin))));
    let sum = 0, cnt = 0;
    for (let j = rawStart; j <= rawEnd; j++) { sum += fftMag[j]; cnt++; }
    const raw = cnt > 0 ? sum / cnt : 0;
    /* Instant attack, slow eased decay */
    if (raw > fftSmooth[i]) fftSmooth[i] = raw;
    else fftSmooth[i] += (raw - fftSmooth[i]) * 0.04;
    const norm = Math.min(1, fftSmooth[i] / fftCeil);
    const bh = Math.floor(norm * fftH);
    if (bh < 1) continue;
    const hue = Math.floor((i / fftBins) * 260);
    const lum = 25 + Math.floor(norm * 35);
    ctx.fillStyle = `hsla(${hue},85%,${lum}%,${0.35 + norm * 0.35})`;
    ctx.fillRect(i * barW, H - bh, barW - 1, bh);
    if (norm > 0.5) {
      ctx.fillStyle = `hsla(${hue},90%,${lum+25}%,${norm * 0.2})`;
      ctx.fillRect(i * barW, H - bh - 1, barW - 1, 2);
    }
  }

  /* ── Waveform (center) — normalized, trim trailing silence ── */
  const waveY = H * 0.28;
  const waveH = H * 0.35;
  /* Find last non-zero sample to trim zero-padding */
  let lastNZ = scopeInterp.length - 1;
  while (lastNZ > 0 && Math.abs(scopeInterp[lastNZ]) < 0.0001) lastNZ--;
  /* Round up to stereo frame boundary */
  const sigEnd = Math.min(scopeInterp.length, (Math.floor(lastNZ / 2) + 1) * 2);
  const frames = Math.max(2, Math.floor(sigEnd / 2));
  const focusClr = CH_COLORS[focusedCh % 16];
  const [fr,fg,fb] = hexRgb(focusClr);
  const step = Math.max(1, Math.floor(frames / 100));

  function drawWave(lw, alpha) {
    ctx.beginPath();
    ctx.strokeStyle = `rgba(${fr},${fg},${fb},${alpha})`;
    ctx.lineWidth = lw;
    ctx.lineJoin = 'miter';
    for (let i = 0; i < frames; i += step) {
      const x = Math.floor((i / (frames-1)) * W);
      const mono = (scopeInterp[i*2] + scopeInterp[i*2+1]) * 0.5;
      const y = Math.floor(waveY + waveH * 0.5 - mono * waveGain * waveH * 0.45);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  drawWave(3, 0.12);
  drawWave(2, 0.35);
  drawWave(1, 1);

  /* ── Channel meters (top-right, inline with logo, 7px tall) ── */
  const mW = 5;
  const mGap = 1;
  const mH = 7; /* same as logo font height */
  const mY = 3; /* same as logo Y */
  const mX0 = W - 16 * (mW + mGap) - 3;
  for (let i = 0; i < 16; i++) {
    const x = mX0 + i * (mW + mGap);
    const pk = peaks[i];
    const h = Math.max(0, Math.floor(Math.min(pk, 1) * mH));
    const clr = CH_COLORS[i];
    const [cr,cg,cb] = hexRgb(clr);

    ctx.fillStyle = slotActive[i] ? 'rgba(14,21,37,0.4)' : 'rgba(14,21,37,0.15)';
    ctx.fillRect(x, mY, mW, mH);

    if (slotActive[i] && pk > 0.001) {
      ctx.fillStyle = `rgba(${cr},${cg},${cb},${0.4 + pk * 0.6})`;
      ctx.fillRect(x, mY + mH - h, mW, h);
    }

    if (i === focusedCh) {
      ctx.fillStyle = focusClr;
      ctx.fillRect(x, mY + mH + 1, mW, 1);
    }
  }

  /* ── Particles — low-poly vector shapes ── */
  updateParticles();
  for (const p of particles) {
    const [pr,pg,pb] = hexRgb(p.color);
    const a = p.life * 0.85;
    const sz = p.size * (0.3 + p.life * 0.7);
    const px = p.x * W;
    const py = p.y * H;
    /* glow */
    ctx.fillStyle = `rgba(${pr},${pg},${pb},${a * 0.15})`;
    drawPoly(px, py, sz * 2, p.shape, p.rot);
    /* core */
    ctx.fillStyle = `rgba(${pr},${pg},${pb},${a})`;
    drawPoly(px, py, sz, p.shape, p.rot);
    /* hot pixel center */
    if (sz > 1.5) {
      ctx.fillStyle = `rgba(255,255,255,${a * 0.5})`;
      ctx.fillRect(Math.floor(px), Math.floor(py), 1, 1);
    }
  }

  /* ── Master level (bottom edge) ── */
  const mlY = H - 2;
  const mlL = Math.floor(Math.min(masterPk[0],1) * W * 0.5);
  const mlR = Math.floor(Math.min(masterPk[1],1) * W * 0.5);
  ctx.fillStyle = 'rgba(0,212,170,0.5)';
  ctx.fillRect(Math.floor(W/2) - mlL, mlY, mlL, 2);
  ctx.fillRect(Math.floor(W/2), mlY, mlR, 2);
  ctx.fillStyle = '#e94560';
  ctx.fillRect(Math.floor(W/2) - Math.floor(Math.min(masterHold[0],1)*W*0.5), mlY, 1, 2);
  ctx.fillRect(Math.floor(W/2) + Math.floor(Math.min(masterHold[1],1)*W*0.5), mlY, 1, 2);

  /* ── Logo + channel info (top-left) ── */
  const logoEnd = drawText(3, 3, 'miniwave', `rgba(233,69,96,${0.4 + beatPulse * 0.3})`);
  const chNum = focusedCh + 1;
  const chType = slotTypes[focusedCh] || '---';
  drawText(logoEnd + 4, 3, chNum + ': ' + chType, `rgba(${hexRgb(focusClr).join(',')},0.6)`);

  /* ── Blit lo-res → hi-res (nearest neighbor) ── */
  hiCtx.drawImage(loCanvas, 0, 0, canvas.width, canvas.height);
}

/* ── Logo click → navigate back to main view ── */
canvas?.addEventListener('click', e => {
  /* Logo occupies roughly top-left 60x12 in screen coords */
  const scaleX = LO_W / canvas.width;
  const scaleY = LO_H / canvas.height;
  const lx = e.offsetX * scaleX;
  const ly = e.offsetY * scaleY;
  if (lx < 60 && ly < 14) {
    if (window.parent !== window) window.parent.postMessage('nav:miniwave', '*');
    else window.location.href = '/';
  }
});

requestAnimationFrame(render);
</script>
</body>
</html>
