<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0d0d">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<title>miniwave — effex</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
* { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent; }
:root {
  --bg: #0d0d0d; --panel: #1a1a2e; --card: #0e1525; --accent: #e94560; --good: #00d4aa; --text: #e0e0e0; --dim: #666; --border: #2a2a4a;
  --hw-shadow: rgba(255,255,255,0.18) 0 1px 1px 0 inset, rgba(0,0,0,0.7) 0 -1px 1px 0 inset, rgba(0,0,0,0.25) 0 1px 2px 0, rgba(0,0,0,0.22) 0 3px 4px -1px, rgba(0,0,0,0.18) 0 6px 8px -2px;
  --hw-shadow-sm: rgba(255,255,255,0.15) 0 1px 0 0 inset, rgba(0,0,0,0.6) 0 -1px 0 0 inset, rgba(0,0,0,0.3) 0 1px 2px 0;
  --hw-pressed: rgba(0,0,0,0.85) 0 1px 5px 0 inset;
}
html, body { background: var(--bg); color: var(--text); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; height: 100%; overflow: hidden; }

#page { display: flex; flex-direction: column; height: 100%; padding: 16px 20px; gap: 12px; }
#header { flex-shrink: 0; display: flex; align-items: center; gap: 12px; }
#header h1 { color: var(--accent); font-size: 16px; white-space: nowrap; }
#header h1 a { text-decoration: none; }

#content { flex: 1; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }

.section { background: var(--panel); border: none; border-radius: 6px; padding: 12px; flex-shrink: 0; box-shadow: var(--hw-shadow); }
.section h3 { color: var(--good); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
</style>
</head>
<body>
<div id="page">

<div id="header">
  <h1><a href="/" style="color:var(--accent)">miniwave</a> / <a href="/keyseq" style="color:#8866cc">keyseq</a> / <span style="color:#00d4aa">effex</span> / <a href="/chords" style="color:#ff8800">chords</a> / <a href="/config" style="color:#666">cfg</a> <span id="ver" style="color:var(--dim);font-size:10px;font-weight:normal"></span></h1>
</div>

<div id="content">
  <div class="section">
    <h3>Effects Chain</h3>
    <div style="color:var(--dim);padding:40px;text-align:center">Coming soon — delay, algo delay, wave function collapse delay</div>
  </div>
</div>

</div>
<script>
const es = new EventSource('/events');
es.addEventListener('rack_status', e => {
  const d = JSON.parse(e.data);
  const v = document.getElementById('ver');
  if (v && d.version) v.textContent = 'v' + d.version;
});
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
</body>
</html>
