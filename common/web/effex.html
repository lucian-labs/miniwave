<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Effex — miniwave</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #0d0d0d; --panel: #1a1a2e; --card: #0e1525; --accent: #e94560; --good: #00d4aa; --text: #e0e0e0; --dim: #666; --border: #2a2a4a; }
html, body { background: var(--bg); color: var(--text); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; height: 100%; overflow: hidden; }

#page { display: flex; flex-direction: column; height: 100%; padding: 16px 20px; gap: 12px; }

#header { flex-shrink: 0; display: flex; align-items: center; gap: 12px; }
#header h1 { color: var(--accent); font-size: 16px; white-space: nowrap; }
#header h1 a { text-decoration: none; }

.section { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 16px; flex-shrink: 0; }
.section h3 { color: var(--good); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

#content { flex: 1; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
</style>
</head>
<body>

<div id="page">

<div id="header">
  <h1><a href="/" style="color:var(--dim)">miniwave</a> / <a href="/keyseq-test" style="color:#8866cc">keyseq</a> / <span style="color:#00d4aa">effex</span></h1>
</div>

<div id="content">
  <div class="section">
    <h3>Effects Chain</h3>
    <div style="color:var(--dim);padding:20px;text-align:center">Coming soon</div>
  </div>
</div>

</div>

<script>
'use strict';
</script>
</body>
</html>
