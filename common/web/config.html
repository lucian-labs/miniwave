<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0d0d">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<title>miniwave — config</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
* { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent; }
:root {
  --bg: #0d0d0d; --panel: #1a1a2e; --card: #0e1525; --accent: #e94560; --good: #00d4aa; --text: #e0e0e0; --dim: #666; --border: #2a2a4a;
  --hw-shadow:
    rgba(255,255,255,0.18) 0 1px 1px 0 inset,
    rgba(0,0,0,0.7) 0 -1px 1px 0 inset,
    rgba(0,0,0,0.25) 0 1px 2px 0,
    rgba(0,0,0,0.22) 0 3px 4px -1px,
    rgba(0,0,0,0.18) 0 6px 8px -2px;
  --hw-shadow-sm:
    rgba(255,255,255,0.15) 0 1px 0 0 inset,
    rgba(0,0,0,0.6) 0 -1px 0 0 inset,
    rgba(0,0,0,0.3) 0 1px 2px 0;
  --hw-pressed: rgba(0,0,0,0.85) 0 1px 5px 0 inset;
}
html, body { background: var(--bg); color: var(--text); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; height: 100%; overflow: hidden; }

#page { display: flex; flex-direction: column; height: 100%; padding: 16px 20px; gap: 12px; }

#header { flex-shrink: 0; display: flex; align-items: center; gap: 12px; }
#header h1 { color: var(--accent); font-size: 16px; white-space: nowrap; }
#header h1 a { text-decoration: none; }
#header .uptime { color: var(--dim); font-size: 10px; }
#header .touch-link { margin-left: auto; font-size: 11px; color: var(--good); text-decoration: none; padding: 4px 10px; background: var(--card); border-radius: 5px; box-shadow: var(--hw-shadow-sm); }
#header .touch-link:hover { color: #fff; }

#columns { display: flex; gap: 14px; flex: 1; min-height: 0; overflow-y: auto; }
.col { flex: 1; display: flex; flex-direction: column; gap: 10px; min-width: 0; }

.section { background: var(--panel); border: none; border-radius: 6px; padding: 12px; flex-shrink: 0; box-shadow: var(--hw-shadow); }
.section h3 { color: var(--accent); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

.row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 12px; }
.row .label { color: var(--dim); }
.row .val { color: var(--text); text-align: right; }
.row .val.good { color: var(--good); }
.row .val.warn { color: #ffd700; }
.row .val.off { color: var(--dim); }

.cpu-bar { height: 6px; background: var(--card); border-radius: 3px; margin-top: 4px; overflow: hidden; box-shadow: var(--hw-pressed); }
.cpu-fill { height: 100%; border-radius: 3px; transition: width 0.3s, background 0.3s; }

.slot-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
.slot-cell {
  background: var(--card); border: 1px solid var(--border); border-radius: 4px;
  padding: 5px 6px; font-size: 9px; text-align: center; cursor: pointer;
  box-shadow: var(--hw-shadow-sm); transition: all 0.15s;
}
.slot-cell:hover { border-color: var(--accent); }
.slot-cell:active { box-shadow: var(--hw-pressed); }
.slot-cell.active { border-color: var(--good); }
.slot-cell.focused { border-color: var(--accent); box-shadow: 0 0 6px rgba(233,69,96,0.3); }
.slot-cell .ch { color: var(--dim); font-size: 8px; }
.slot-cell .type { color: var(--text); font-size: 10px; }
.slot-cell.empty .type { color: var(--dim); font-style: italic; }

.midi-dev {
  background: var(--card); border: 1px solid var(--border); border-radius: 4px;
  padding: 6px 10px; margin-bottom: 3px; font-size: 11px;
  display: flex; justify-content: space-between; cursor: pointer;
  box-shadow: var(--hw-shadow-sm); transition: all 0.15s;
}
.midi-dev:hover { border-color: var(--accent); }
.midi-dev:active { box-shadow: var(--hw-pressed); }
.midi-dev .id { color: var(--dim); }
.midi-dev.connected { border-color: var(--good); }

.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.dot.on { background: var(--good); box-shadow: 0 0 4px var(--good); }
.dot.off { background: var(--dim); }

@media (max-width: 700px) { #columns { flex-direction: column; overflow-y: auto; } }
</style>
</head>
<body>
<div id="page">

<div id="header">
  <h1><a href="/" style="color:var(--accent)">miniwave</a> / <a href="/keyseq" style="color:#8866cc">keyseq</a> / <a href="/effex" style="color:#00d4aa">effex</a> / <a href="/chords" style="color:#ff8800">chords</a> / <span style="color:var(--text)">cfg</span> <span id="version" style="color:var(--dim);font-size:10px;font-weight:normal"></span></h1>
  <span class="uptime" id="uptime"></span>
  <a href="/touch" class="touch-link">touch</a>
</div>

<div id="columns">
  <div class="col">
    <div class="section">
      <h3>System</h3>
      <div class="row"><span class="label">Audio</span><span class="val good" id="audio-backend"></span></div>
      <div class="row"><span class="label">Device</span><span class="val" id="audio-device"></span></div>
      <div class="row"><span class="label">Rate</span><span class="val" id="sample-rate"></span></div>
      <div class="row"><span class="label">Period</span><span class="val" id="period-size"></span></div>
      <div class="row"><span class="label">BPM</span><span class="val" id="bpm"></span></div>
      <div class="row"><span class="label">Master</span><span class="val" id="master-vol"></span></div>
      <div class="row"><span class="label">Mute</span><span class="val" id="local-mute"></span></div>
      <div class="row"><span class="label">CPU</span><span class="val" id="cpu-load"></span></div>
      <div class="cpu-bar"><div class="cpu-fill" id="cpu-fill"></div></div>
    </div>
  </div>

  <div class="col">
    <div class="section">
      <h3>Network</h3>
      <div class="row"><span class="label">HTTP/SSE</span><span class="val good">:8080</span></div>
      <div class="row"><span class="label">OSC</span><span class="val" id="osc-port"></span></div>
      <div class="row"><span class="label">Multicast</span><span class="val" id="mcast"></span></div>
      <div class="row"><span class="label">Bus</span><span class="val" id="bus"></span></div>
      <div class="row"><span class="label">SSE</span><span class="val" id="sse-clients"></span></div>
    </div>
    <div class="section">
      <h3>Rack</h3>
      <div class="slot-grid" id="slot-grid"></div>
    </div>
  </div>

  <div class="col">
    <div class="section">
      <h3>MIDI</h3>
      <div class="row"><span class="label">Active</span><span class="val" id="midi-connected"></span></div>
      <div id="midi-list" style="margin-top:6px"></div>
    </div>
  </div>
</div>

</div>

<script>
const $ = id => document.getElementById(id);
let startTime = Date.now();
let currentMidi = '';
let focusedCh = -1;

const es = new EventSource('/events');

es.addEventListener('rack_status', e => {
  const d = JSON.parse(e.data);
  $('version').textContent = 'v' + (d.version || '?');
  $('audio-backend').textContent = d.audio_backend;
  $('audio-device').textContent = d.audio_device || 'default';
  $('sample-rate').textContent = d.sample_rate + ' Hz';
  $('period-size').textContent = d.period_size + ' (' + (d.period_size / d.sample_rate * 1000).toFixed(1) + 'ms)';
  $('bpm').textContent = d.bpm;
  $('master-vol').textContent = (d.master_volume * 100).toFixed(0) + '%';
  $('local-mute').innerHTML = d.local_mute
    ? '<span class="dot on"></span>bus only' : '<span class="dot off"></span>off';

  const cpu = d.cpu_load * 100;
  $('cpu-load').textContent = cpu.toFixed(1) + '%';
  $('cpu-load').className = 'val ' + (cpu > 80 ? 'warn' : cpu > 0 ? 'good' : '');
  const f = $('cpu-fill');
  f.style.width = Math.min(cpu, 100) + '%';
  f.style.background = cpu > 80 ? '#ffd700' : cpu > 50 ? '#ff8800' : 'var(--good)';

  $('osc-port').textContent = ':' + d.osc_port;
  $('osc-port').className = 'val good';
  if (d.mcast_active) { $('mcast').textContent = d.mcast_group; $('mcast').className = 'val good'; }
  else { $('mcast').textContent = 'off'; $('mcast').className = 'val off'; }
  if (d.bus_active) { $('bus').textContent = 'slot ' + d.bus_slot; $('bus').className = 'val good'; }
  else { $('bus').textContent = '---'; $('bus').className = 'val off'; }
  $('sse-clients').textContent = d.sse_clients;

  currentMidi = d.midi_device || '';
  $('midi-connected').innerHTML = currentMidi
    ? '<span class="dot on"></span>' + currentMidi
    : '<span class="dot off"></span>none';

  focusedCh = d.focused_ch || 0;
  const grid = $('slot-grid');
  grid.innerHTML = '';
  d.slots.forEach((s, i) => {
    const c = document.createElement('div');
    c.className = 'slot-cell' + (s.active ? ' active' : ' empty') + (i === focusedCh ? ' focused' : '');
    c.innerHTML = '<div class="ch">' + (i+1) + '</div><div class="type">' + (s.active ? s.type : '---') + '</div>';
    c.onclick = () => fetch('/api', {method:'POST', body:JSON.stringify({type:'focus_ch', channel:i})});
    grid.appendChild(c);
  });
});

es.addEventListener('midi_devices', e => {
  const d = JSON.parse(e.data);
  const list = $('midi-list');
  list.innerHTML = '';
  if (!d.devices.length) { list.innerHTML = '<div style="color:var(--dim);font-size:11px">no devices</div>'; return; }
  d.devices.forEach(dev => {
    const el = document.createElement('div');
    el.className = 'midi-dev' + (currentMidi.includes(dev.id) ? ' connected' : '');
    el.innerHTML = '<span>' + dev.name + '</span><span class="id">' + dev.id + '</span>';
    el.onclick = () => fetch('/api', {method:'POST', body:JSON.stringify({type:'midi_device', value:dev.id})});
    list.appendChild(el);
  });
});

setInterval(() => {
  const s = Math.floor((Date.now() - startTime) / 1000);
  $('uptime').textContent = Math.floor(s/60) + 'm ' + (s%60) + 's';
}, 1000);

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
</body>
</html>
