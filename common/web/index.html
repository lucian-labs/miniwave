<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<title>miniwave</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
* { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent; }

:root {
  --bg: #0d0d0d; --panel: #111; --card: #0e1525; --accent: #e94560; --good: #00d4aa;
  --text: #eee; --dim: #aaa; --border: #2a2a4a;
  --hw-shadow: rgba(255,255,255,0.18) 0 1px 1px 0 inset, rgba(0,0,0,0.7) 0 -1px 1px 0 inset, rgba(0,0,0,0.25) 0 1px 2px 0, rgba(0,0,0,0.22) 0 3px 4px -1px, rgba(0,0,0,0.18) 0 6px 8px -2px;
  --hw-shadow-sm: rgba(255,255,255,0.15) 0 1px 0 0 inset, rgba(0,0,0,0.6) 0 -1px 0 0 inset, rgba(0,0,0,0.3) 0 1px 2px 0;
  --hw-pressed: rgba(0,0,0,0.85) 0 1px 5px 0 inset;
}
html, body { background: var(--bg); color: var(--text); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; height: 100%; overflow: hidden; }

#shell { display: flex; flex-direction: column; height: 100%; }

#header {
  flex-shrink: 0; display: flex; align-items: center; gap: 10px;
  padding: 8px 16px; border-bottom: 1px solid var(--border);
}
#header h1 { font-size: 14px; white-space: nowrap; display: flex; gap: 0; }
#header h1 a, #header h1 span { padding: 4px 8px; font-size: 12px; border-radius: 4px; text-decoration: none; cursor: pointer; transition: all 0.15s; }
#header h1 a { color: var(--dim); }
#header h1 a:hover { color: var(--text); background: var(--card); }
#header h1 a.active, #header h1 span.active { color: white; box-shadow: var(--hw-pressed); }

.ch-nav { display: flex; align-items: center; gap: 2px; }
.ch-nav button { width: 24px; height: 24px; padding: 0; font-size: 13px; line-height: 24px; text-align: center; border-radius: 5px; background: var(--card); border: none; color: var(--dim); cursor: pointer; box-shadow: var(--hw-shadow); transition: all 0.15s; }
.ch-nav button:hover { color: var(--text); }
.ch-nav button:active { box-shadow: var(--hw-pressed); }
.ch-label { font-size: 12px; font-weight: bold; color: var(--text); min-width: 44px; text-align: center; }

.bpm-group { display: flex; align-items: center; gap: 4px; }
.bpm-group input { width: 36px; background: var(--card); border: 1px solid var(--border); color: var(--text); font-family: inherit; font-size: 11px; padding: 3px; border-radius: 4px; text-align: center; }
.bpm-group input:focus { outline: none; border-color: var(--accent); }
.bpm-label { font-size: 9px; color: var(--dim); text-transform: uppercase; }
.tap-btn { padding: 3px 8px; font-size: 10px; font-weight: bold; border-radius: 5px; background: var(--card); border: none; color: var(--text); cursor: pointer; box-shadow: var(--hw-shadow-sm); transition: all 0.15s; }
.tap-btn:active { background: var(--accent); color: white; box-shadow: var(--hw-pressed); }

.master-group { display: flex; align-items: center; gap: 4px; }
.master-group label { color: var(--dim); font-size: 9px; text-transform: uppercase; }
#master-vol { width: 60px; accent-color: var(--accent); }
#master-val { font-size: 10px; color: var(--dim); min-width: 24px; }

.midi-group { margin-left: auto; display: flex; align-items: center; gap: 6px; }
.midi-group label { font-size: 9px; color: var(--dim); text-transform: uppercase; }
/* midi-select removed — managed in config page */

.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #555; transition: background 0.3s; flex-shrink: 0; }
.status-dot.on { background: var(--good); box-shadow: 0 0 4px var(--good); }

.ver { color: var(--dim); font-size: 9px; }

#view { flex: 1; border: none; width: 100%; }
</style>
</head>
<body>
<div id="shell">

<div id="header">
  <h1>
    <a href="#miniwave" class="active" style="background:var(--accent);display:flex;align-items:center;gap:4px" onclick="nav('miniwave')"><img id="logo-img" src="/icon.svg" style="width:20px;height:20px;transition:filter 0.15s cubic-bezier(.4,0,.2,1)"></a>
    <a href="#rack" onclick="nav('rack')">rack</a>
    <a href="#keyseq" style="color:#8866cc" onclick="nav('keyseq')">keyseq</a>
    <a href="#effex" style="color:#00d4aa" onclick="nav('effex')">effex</a>
    <a href="#chords" style="color:#ff8800" onclick="nav('chords')">chords</a>
    <a href="#viz" style="color:#aa44ff" onclick="nav('viz')">viz</a>
    <a href="#config" onclick="nav('config')">cfg</a>
  </h1>
  <div class="ch-nav">
    <button id="ch-prev">&lsaquo;</button>
    <span class="ch-label" id="ch-label">CH 1</span>
    <button id="ch-next">&rsaquo;</button>
  </div>
  <div class="bpm-group">
    <input type="text" id="bpm-input" value="120">
    <span class="bpm-label">bpm</span>
    <button class="tap-btn" id="tap-btn">TAP</button>
  </div>
  <div class="master-group">
    <label>Master</label>
    <input type="range" id="master-vol" min="0" max="1" step="0.01" value="0.75">
    <span id="master-val">0.75</span>
  </div>
  <div class="midi-group">
    <span id="midi-badge" style="font-size:9px;color:var(--dim)"></span>
    <div class="status-dot" id="sse-dot"></div>
    <span class="ver" id="ver"></span>
  </div>
</div>

<iframe id="view" src="/rack?mode=detail"></iframe>

</div>

<script>
'use strict';
const api = b => fetch('/api', {method:'POST', body:JSON.stringify(b)});

/* ── Navigation ── */
let currentView = 'miniwave';

function nav(view) {
  if (view === currentView) return;
  currentView = view;
  /* miniwave and rack are both served from /rack with different modes */
  const src = (view === 'miniwave') ? '/rack?mode=detail'
            : (view === 'rack') ? '/rack?mode=grid'
            : '/' + view;
  document.getElementById('view').src = src;
  document.title = 'miniwave — ' + view;
  history.replaceState(null, '', '#' + view);
  /* Hide header in viz mode */
  const hdr = document.getElementById('header');
  if (hdr) hdr.style.display = (view === 'viz') ? 'none' : '';
  /* Update tab highlight */
  document.querySelectorAll('#header h1 a').forEach(a => {
    const v = a.getAttribute('href').slice(1);
    a.classList.toggle('active', v === view);
    if (v === view) a.style.background = 'var(--accent)';
    else a.style.background = '';
  });
  return false;
}

/* Listen for viz iframe requesting nav back */
window.addEventListener('message', e => {
  if (e.data === 'nav:miniwave') nav('miniwave');
});

/* Restore from hash */
const hash = location.hash.slice(1);
if (hash && ['miniwave','rack','keyseq','effex','chords','viz','config'].includes(hash)) {
  nav(hash);
}

/* ── SSE (single connection, shared across views) ── */
let es = null;
let rackState = {};

function connectSSE() {
  es = new EventSource('/events');
  es.onopen = () => document.getElementById('sse-dot')?.classList.add('on');
  es.onerror = () => {
    document.getElementById('sse-dot')?.classList.remove('on');
    es.close();
    setTimeout(connectSSE, 2000);
  };

  es.addEventListener('rack_status', e => {
    const d = JSON.parse(e.data);
    rackState = d;

    /* Version */
    const v = document.getElementById('ver');
    if (v && d.version) v.textContent = 'v' + d.version;

    /* BPM */
    const bpm = document.getElementById('bpm-input');
    if (bpm && document.activeElement !== bpm) bpm.value = d.bpm;

    /* Master */
    const mv = document.getElementById('master-vol');
    const mvl = document.getElementById('master-val');
    if (mv && document.activeElement !== mv) mv.value = d.master_volume;
    if (mvl) mvl.textContent = (d.master_volume * 100).toFixed(0) + '%';

    /* Logo brightness from master peak */
    if (d.master_pk) {
      const pk = Math.max(d.master_pk[0], d.master_pk[1]);
      const bright = 1.0 + pk * 2.5; /* 1.0 (silent) → 3.5 (loud) */
      const logo = document.getElementById('logo-img');
      if (logo) logo.style.filter = 'brightness(' + bright.toFixed(2) + ')';
    }

    /* Ch label */
    if (typeof d.focused_ch === 'number') {
      const chl = document.getElementById('ch-label');
      if (chl) chl.textContent = 'CH ' + (d.focused_ch + 1);
    }

    /* MIDI badge */
    const mb = document.getElementById('midi-badge');
    if (mb) mb.textContent = d.midi_device || 'no midi';
  });
}
connectSSE();

/* ── Channel nav ── */
let focusedCh = 0;

{ const el = document.getElementById('ch-prev');
  if (el) el.onclick = () => {
  focusedCh = (focusedCh + 15) % 16;
  const chl = document.getElementById('ch-label');
  if (chl) chl.textContent = 'CH ' + (focusedCh + 1);
  api({type:'focus_ch', channel:focusedCh});
}; }
{ const el = document.getElementById('ch-next');
  if (el) el.onclick = () => {
  focusedCh = (focusedCh + 1) % 16;
  const chl = document.getElementById('ch-label');
  if (chl) chl.textContent = 'CH ' + (focusedCh + 1);
  api({type:'focus_ch', channel:focusedCh});
}; }

/* Track focused_ch from SSE */
es && es.addEventListener && es.addEventListener('rack_status', e => {
  const d = JSON.parse(e.data);
  if (typeof d.focused_ch === 'number') focusedCh = d.focused_ch;
});

/* ── BPM + tap tempo ── */
let tapTimes = [];

document.getElementById('bpm-input')?.addEventListener('change', e => {
  const v = parseFloat(e.target.value);
  if (v > 0 && v <= 999) api({type:'bpm', value:v});
});

document.getElementById('tap-btn')?.addEventListener('click', () => {
  const now = performance.now();
  tapTimes.push(now);
  if (tapTimes.length > 8) tapTimes.shift();
  if (tapTimes.length >= 2) {
    const ivs = [];
    for (let i = 1; i < tapTimes.length; i++) ivs.push(tapTimes[i] - tapTimes[i-1]);
    const avg = ivs.reduce((a,b) => a+b) / ivs.length;
    const bpm = Math.round(60000 / avg);
    if (bpm > 20 && bpm < 400) {
      const bi = document.getElementById('bpm-input');
      if (bi) bi.value = bpm;
      api({type:'bpm', value:bpm});
    }
  }
  clearTimeout(document.getElementById('tap-btn')._r);
  document.getElementById('tap-btn')._r = setTimeout(() => { tapTimes = []; }, 2000);
});

/* ── Master volume ── */
document.getElementById('master-vol')?.addEventListener('input', e => {
  const val = parseFloat(e.target.value);
  const mvl = document.getElementById('master-val');
  if (mvl) mvl.textContent = (val * 100).toFixed(0) + '%';
  api({type:'master_volume', value:val});
});

/* ── Web MIDI (shell-level, persists across tabs) ── */
let webMidiAccess = null;
const webMidiInputs = new Map(); /* id → {input, connected} */
const WM_KEY = 'miniwave_webmidi';

function wmSave() {
  const ids = [];
  for (const [id, e] of webMidiInputs) { if (e.connected) ids.push(id); }
  try { localStorage.setItem(WM_KEY, JSON.stringify(ids)); } catch(e) {}
}

function wmLoad() {
  try { return JSON.parse(localStorage.getItem(WM_KEY)) || []; } catch(e) { return []; }
}

function wmConnect(id) {
  if (!webMidiAccess) return;
  const input = webMidiAccess.inputs.get(id);
  if (!input) return;
  input.onmidimessage = e => {
    if (e.data.length >= 2) api({type:'midi_raw', data:Array.from(e.data)});
  };
  webMidiInputs.set(id, {input, connected:true});
  wmSave();
  wmUpdateBadge();
}

function wmDisconnect(id) {
  const entry = webMidiInputs.get(id);
  if (entry && entry.input) entry.input.onmidimessage = null;
  webMidiInputs.delete(id);
  wmSave();
  wmUpdateBadge();
}

function wmUpdateBadge() {
  const mb = document.getElementById('midi-badge');
  if (!mb) return;
  let count = 0;
  for (const [, e] of webMidiInputs) { if (e.connected) count++; }
  if (count > 0) mb.textContent = count + ' midi';
  else mb.textContent = 'no midi';
}

/* Expose to iframe (config page) */
window.wmConnect = wmConnect;
window.wmDisconnect = wmDisconnect;
window.wmInputs = webMidiInputs;
window.wmAccess = () => webMidiAccess;

function initWebMidi() {
  if (!navigator.requestMIDIAccess) { wmUpdateBadge(); return; }
  navigator.requestMIDIAccess({sysex:false}).then(access => {
    webMidiAccess = access;
    /* Restore saved connections */
    const saved = wmLoad();
    for (const id of saved) {
      if (access.inputs.has(id)) wmConnect(id);
    }
    access.onstatechange = () => {
      /* Auto-reconnect saved devices on hotplug */
      const saved2 = wmLoad();
      for (const id of saved2) {
        if (access.inputs.has(id) && !webMidiInputs.has(id)) wmConnect(id);
      }
      wmUpdateBadge();
    };
    wmUpdateBadge();
  }).catch(() => {
    const mb = document.getElementById('midi-badge');
    if (mb) mb.textContent = 'midi denied';
  });
}
initWebMidi();

/* ── Service Worker ── */
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
</body>
</html>
